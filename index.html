                    { emojis: '🇫🇷🐎⚔️', answers: ['نابليون', 'نابليون بونابرت', 'napoleon'], hint: 'إمبراطور فرنسي وقائد عسكري عظيم' },
                    { emojis: '🇺🇸🎩📜', answers: ['لينكولن', 'ابراهام لينكولن', 'lincoln', 'abraham lincoln'], hint: 'رئيس أمريكي أنهى العبودية' },
                    { emojis: '🇺🇸✊🏾🎤', answers: ['مارتن لوثر كينج', 'مارتن لوثر', 'martin luther king', 'mlk'], hint: 'قائد حركة الحقوق المدنية صاحب خطبة "لدي حلم"' },
                    { emojis: '🥊🦋🐝', answers: ['محمد علي كلاي', 'محمد علي', 'muhammad ali'], hint: 'أسطورة الملاكمة "يطير كالفراشة ويلدغ كالنحلة"' },
                    { emojis: '✈️👨‍👦‍👦☁️', answers: ['الاخوان رايت', 'أخوان رايت', 'wright brothers'], hint: 'أول من اخترع طائرة تعمل بنجاح' },
                    { emojis: '🚢🌎🔭', answers: ['كولومبوس', 'كريستوفر كولومبوس', 'columbus'], hint: 'مستكشف يُنسب إليه اكتشاف الأمريكتين' },
                    { emojis: '⚕️📚👳‍♂️', answers: ['ابن سينا', 'ibn sina', 'avicenna'], hint: 'طبيب وعالم مسلم صاحب كتاب القانون في الطب' },
                    { emojis: '👩‍🔬☢️🏆', answers: ['ماري كوري', 'marie curie'], hint: 'عالمة فيزياء وكيمياء فازت بجائزتي نوبل' },
                ]
            }
        };

        function App() {
            // حالة الأقسام والمراحل المحلولة (يتم جلبها من LocalStorage إذا وجدت)
            const [solvedProgress, setSolvedProgress] = useState(() => {
                const saved = localStorage.getItem('emojiGameProgress_v2');
                if (saved) return JSON.parse(saved);
                return { movies: [], series: [], games: [], football: [], history: [] };
            });

            const [activeCategory, setActiveCategory] = useState(null); // القسم المفتوح حالياً
            const [currentLevel, setCurrentLevel] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [justSolved, setJustSolved] = useState(false);
            const [shake, setShake] = useState(false);
            const [showHintModal, setShowHintModal] = useState(false); // حالة إظهار التلميح
            const inputRef = useRef(null);

            // حفظ التقدم تلقائياً
            useEffect(() => {
                localStorage.setItem('emojiGameProgress_v2', JSON.stringify(solvedProgress));
            }, [solvedProgress]);

            // التركيز التلقائي على خانة الإدخال
            useEffect(() => {
                if (activeCategory && !justSolved && !solvedProgress[activeCategory].includes(currentLevel) && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [currentLevel, activeCategory, justSolved, solvedProgress]);

            // معالجة النص
            const normalizeText = (text) => {
                return text
                    .toLowerCase()
                    .replace(/[أإآا]/g, 'ا')
                    .replace(/[ةه]/g, 'ه')
                    .replace(/[ىي]/g, 'ي')
                    .replace(/[^a-z0-9ا-ي]/g, '') 
                    .trim();
            };

            const checkAnswer = () => {
                if (!inputValue.trim() || !activeCategory) return;
                if (solvedProgress[activeCategory].includes(currentLevel)) return;

                const normalizedInput = normalizeText(inputValue);
                const categoryLevels = categoriesData[activeCategory].levels;
                const level = categoryLevels[currentLevel];
                
                const isCorrect = level.answers.some(
                    (ans) => normalizeText(ans) === normalizedInput
                );

                if (isCorrect) {
                    const updatedCategoryProgress = [...new Set([...solvedProgress[activeCategory], currentLevel])];
                    
                    setSolvedProgress(prev => ({
                        ...prev,
                        [activeCategory]: updatedCategoryProgress
                    }));
                    
                    setJustSolved(true);

                    setTimeout(() => {
                        setJustSolved(false);
                        if (updatedCategoryProgress.length < categoryLevels.length) {
                            // الانتقال للمرحلة غير المحلولة التالية
                            let nextUnsolved = (currentLevel + 1) % categoryLevels.length;
                            while (updatedCategoryProgress.includes(nextUnsolved)) {
                                nextUnsolved = (nextUnsolved + 1) % categoryLevels.length;
                            }
                            changeLevel(nextUnsolved);
                        }
                    }, 1500);
                } else {
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') checkAnswer();
            };

            const changeLevel = (newLevel) => {
                setCurrentLevel(newLevel);
                setInputValue('');
                setShake(false);
                setShowHintModal(false); // إغلاق التلميح عند تغيير المرحلة
            };

            const selectCategory = (categoryId) => {
                setActiveCategory(categoryId);
                
                // البحث عن أول مرحلة غير محلولة لبدء اللعب منها
                const categorySolved = solvedProgress[categoryId];
                const totalLevels = categoriesData[categoryId].levels.length;
                let startingLevel = 0;
                
                if (categorySolved.length > 0 && categorySolved.length < totalLevels) {
                    for (let i = 0; i < totalLevels; i++) {
                        if (!categorySolved.includes(i)) {
                            startingLevel = i;
                            break;
                        }
                    }
                }
                
                setCurrentLevel(startingLevel);
                setInputValue('');
            };

            const resetAllProgress = () => {
                if (window.confirm('هل أنت متأكد أنك تريد حذف جميع تقدمك والبدء من جديد؟')) {
                    setSolvedProgress({ movies: [], series: [], games: [], football: [], history: [] });
                    setActiveCategory(null);
                }
            };

            // واجهة اختيار الأقسام
            if (!activeCategory) {
                const totalSolved = Object.values(solvedProgress).reduce((acc, curr) => acc + curr.length, 0);
                const isMaster = totalSolved === 100;

                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 p-4 sm:p-8">
                        <div className="max-w-5xl mx-auto">
                            <div className="text-center mb-10 animate-fade-in">
                                <h1 className="text-4xl sm:text-5xl font-extrabold text-white mb-4 drop-shadow-lg">تحدي الإيموجي 🧠✨</h1>
                                <p className="text-indigo-200 text-lg mb-6">اختر القسم وابدأ التحدي.. لديك 100 مرحلة!</p>
                                
                                {/* شريط التقدم الكلي */}
                                <div className="bg-white/10 p-4 rounded-2xl backdrop-blur-sm max-w-xl mx-auto border border-white/20">
                                    <div className="flex justify-between text-white font-bold mb-2">
                                        <span>التقدم الإجمالي</span>
                                        <span className={isMaster ? 'text-yellow-400' : ''}>{totalSolved} / 100</span>
                                    </div>
                                    <div className="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
                                        <div 
                                            className="bg-gradient-to-r from-blue-400 to-emerald-400 h-4 rounded-full transition-all duration-1000"
                                            style={{ width: `${totalSolved}%` }}
                                        ></div>
                                    </div>
                                    {isMaster && <p className="text-yellow-400 mt-2 font-bold animate-pulse">👑يا فنااااااااااااااااااان خلصت كل المراحل👑</p>}
                                </div>
                            </div>

                            {/* شبكة الأقسام */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {Object.values(categoriesData).map((cat) => {
                                    const solvedCount = solvedProgress[cat.id].length;
                                    const isCompleted = solvedCount === 20;

                                    return (
                                        <button
                                            key={cat.id}
                                            onClick={() => selectCategory(cat.id)}
                                            className={`relative overflow-hidden group rounded-3xl p-6 text-right transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl bg-white`}
                                        >
                                            <div className={`absolute top-0 right-0 w-full h-2 bg-gradient-to-r ${cat.color}`}></div>
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="text-5xl group-hover:scale-110 transition-transform">{cat.icon}</div>
                                                {isCompleted && <div className="text-3xl" title="مكتمل">🏆</div>}
                                            </div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-2">{cat.name}</h2>
                                            
                                            <div className="flex items-center justify-between text-sm font-semibold text-gray-500 mt-4">
                                                <span>{solvedCount} مرحلة محلولة</span>
                                                <span>{Math.round((solvedCount/20)*100)}%</span>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-2 mt-2">
                                                <div 
                                                    className={`h-2 rounded-full bg-gradient-to-r ${cat.color} transition-all duration-500`}
                                                    style={{ width: `${(solvedCount / 20) * 100}%` }}
                                                ></div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="mt-12 text-center">
                                <button onClick={resetAllProgress} className="text-red-400 hover:text-red-300 underline text-sm">
                                    إعادة ضبط جميع الإحصائيات (بدء اللعبة من جديد)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // واجهة اللعب داخل القسم المختار
            const currentCat = categoriesData[activeCategory];
            const levels = currentCat.levels;
            const categorySolved = solvedProgress[activeCategory];
            const isCurrentSolved = categorySolved.includes(currentLevel);
            const isCategoryFinished = categorySolved.length === levels.length;

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 relative overflow-hidden">
                    {/* خلفية جمالية تعتمد على لون القسم */}
                    <div className={`absolute inset-0 opacity-20 bg-gradient-to-br ${currentCat.color}`}></div>
                    
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-6 sm:p-8 relative z-10">
                        
                        {/* زر العودة */}
                        <button 
                            onClick={() => setActiveCategory(null)}
                            className="absolute top-6 left-6 text-gray-500 hover:text-gray-800 flex items-center gap-2 font-bold transition-colors bg-gray-100 px-3 py-1 rounded-lg"
                        >
                            <span className="text-xl">&times;</span> خروج
                        </button>

                        {/* رأس اللعبة والشريط التقدمي */}
                        <div className="w-full mb-8 text-center mt-8">
                            <div className="text-4xl mb-2">{currentCat.icon}</div>
                            <h1 className="text-2xl font-bold text-gray-800 mb-6">{currentCat.name}</h1>
                            
                            {/* أزرار التنقل بين المراحل */}
                            <div className="flex items-center justify-between bg-gray-50 border rounded-2xl p-2 mb-4">
                                <button 
                                    onClick={() => changeLevel(Math.max(0, currentLevel - 1))}
                                    disabled={currentLevel === 0}
                                    className={`px-4 py-3 rounded-xl font-bold transition ${currentLevel === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-blue-600 hover:bg-white shadow-sm border border-transparent hover:border-gray-200'}`}
                                >
                                    &rarr; 
                                </button>
                                <span className="font-bold text-gray-700 text-lg">مرحلة {currentLevel + 1}</span>
                                <button 
                                    onClick={() => changeLevel(Math.min(levels.length - 1, currentLevel + 1))}
                                    disabled={currentLevel === levels.length - 1}
                                    className={`px-4 py-3 rounded-xl font-bold transition ${currentLevel === levels.length - 1 ? 'text-gray-300 cursor-not-allowed' : 'text-blue-600 hover:bg-white shadow-sm border border-transparent hover:border-gray-200'}`}
                                >
                                     &larr;
                                </button>
                            </div>

                            <div className="flex items-center justify-between text-sm text-gray-500 font-bold mb-2 px-1">
                                <span>التقدم في هذا القسم:</span>
                                <span className={isCategoryFinished ? 'text-green-500' : ''}>{categorySolved.length} / {levels.length}</span>
                            </div>
                            <div className="w-full bg-gray-100 rounded-full h-3">
                                <div 
                                    className={`h-3 rounded-full transition-all duration-700 bg-gradient-to-r ${currentCat.color}`}
                                    style={{ width: `${(categorySolved.length / levels.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* شاشة اكتمال القسم */}
                        {isCategoryFinished && !justSolved && (
                            <div className="bg-green-50 border border-green-200 rounded-2xl p-6 text-center mb-6 animate-fade-in">
                                <div className="text-5xl mb-4">🏆</div>
                                <h3 className="text-xl font-bold text-green-800 mb-2">أنهيت قسم {currentCat.name}!</h3>
                                <p className="text-green-600 mb-4">ممتاز، لقد حللت جميع المراحل العشرون.</p>
                                <button 
                                    onClick={() => setActiveCategory(null)}
                                    className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-xl transition"
                                >
                                    العودة لاختيار قسم آخر
                                </button>
                            </div>
                        )}

                        {/* الإيموجيز */}
                        <div className={`bg-gray-50 rounded-2xl w-full py-12 mb-8 flex flex-col justify-center items-center shadow-inner border transition-all ${isCurrentSolved && !justSolved ? 'border-green-300 bg-green-50' : 'border-gray-200'}`}>
                            <span className={`text-6xl sm:text-7xl tracking-widest ${justSolved ? 'animate-bounce' : ''}`}>
                                {levels[currentLevel].emojis}
                            </span>
                            
                            {/* زر التلميح - يظهر فقط إذا لم يتم حل المرحلة بعد */}
                            {!isCurrentSolved && !justSolved && (
                                <button 
                                    onClick={() => setShowHintModal(true)}
                                    className="mt-6 flex items-center gap-2 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-4 py-2 rounded-full font-bold transition text-sm shadow-sm border border-yellow-300"
                                >
                                    💡 تلميح
                                </button>
                            )}
                        </div>

                        {/* حالة الإجابة */}
                        {justSolved ? (
                            <div className="w-full text-center py-6 text-green-500 font-bold text-2xl animate-pulse">
                                إجابة صحيحة! 👏
                            </div>
                        ) : isCurrentSolved ? (
                            <div className="w-full text-center py-5 bg-green-100 text-green-700 rounded-xl border border-green-200 font-bold text-xl">
                                تم حل هذه المرحلة ✅
                                <div className="text-base font-normal mt-2 text-green-600 bg-white/50 inline-block px-4 py-1 rounded-full">
                                    الإجابة: {levels[currentLevel].answers[0]}
                                </div>
                            </div>
                        ) : (
                            /* خانة الإدخال والزر */
                            <div className={`w-full flex flex-col gap-4 ${shake ? 'animate-shake' : ''}`}>
                                <input
                                    ref={inputRef}
                                    type="text"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    placeholder={`اكتب اسم الـ ${currentCat.name.replace('أ', 'ا').slice(0, -2)}...`}
                                    className="w-full text-center text-xl p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition text-gray-800 bg-white"
                                    autoComplete="off"
                                />
                                
                                <button
                                    onClick={checkAnswer}
                                    className={`w-full bg-gradient-to-r ${currentCat.color} hover:opacity-90 text-white font-bold py-4 rounded-xl transition duration-300 text-xl shadow-md active:transform active:scale-95`}
                                >
                                    تحقق
                                </button>
                            </div>
                        )}
                        
                        {/* نافذة التلميح (Modal) */}
                        {showHintModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-60 animate-fade-in backdrop-blur-sm">
                                <div className="bg-white rounded-3xl p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl transform transition-all">
                                    <div className="text-5xl mb-4">💡</div>
                                    <h3 className="text-2xl font-bold text-gray-800 mb-2">تلميح إضافي</h3>
                                    <p className="text-gray-600 mb-8 text-lg leading-relaxed">
                                        {levels[currentLevel].hint}
                                    </p>
                                    <button 
                                        onClick={() => setShowHintModal(false)}
                                        className="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 rounded-xl transition duration-300"
                                    >
                                        إغلاق
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
