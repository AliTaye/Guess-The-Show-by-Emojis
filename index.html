        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                    gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'correct') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                    gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'win') {
                    osc.type = 'square';
                    [400, 500, 600, 800, 1000].forEach((freq, i) => {
                        setTimeout(() => {
                            const o = ctx.createOscillator();
                            const g = ctx.createGain();
                            o.connect(g); g.connect(ctx.destination);
                            o.frequency.value = freq;
                            g.setValueAtTime(0.1, ctx.currentTime);
                            g.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                            o.start(); o.stop(ctx.currentTime + 0.2);
                        }, i * 150);
                    });
                }
            } catch (e) {
                console.log("Audio not supported or blocked");
            }
        };

                    { emojis: '👩‍🔬☢️🏆', answers: ['ماري كوري'], hint: 'عالمة فيزياء وكيمياء فازت بجائزتي نوبل' },
                ]
            },
            brands: {
                id: 'brands', name: 'ماركات وشركات', icon: '🏷️', color: 'from-pink-500 to-rose-500',
                levels: [
                    { emojis: '🍎📱💻', answers: ['ابل'], hint: 'شركة هواتف ذكية وحواسيب شهيرة بشعار الفاكهة' },
                    { emojis: '☕🧜‍♀️🟢', answers: ['ستاربكس'], hint: 'مقهى عالمي شهير بشعاره الأخضر' },
                    { emojis: '🚗🐎🔴', answers: ['فيراري'], hint: 'سيارات رياضية إيطالية فارهة بشعار الحصان' },
                    { emojis: '👟✔️🏃‍♂️', answers: ['نايكي'], hint: 'ماركة رياضية شهيرة بعلامة (الصح)' },
                    { emojis: '🍔🍟🤡', answers: ['ماكدونالدز'], hint: 'أشهر سلسلة مطاعم للوجبات السريعة' },
                    { emojis: '🥤🔴⚪', answers: ['كوكاكولا'], hint: 'مشروب غازي شهير باللون الأحمر' },
                    { emojis: '🚗🔋🔌', answers: ['تسلا'], hint: 'رائدة صناعة السيارات الكهربائية' },
                    { emojis: '💻🪟🟦', answers: ['مايكروسوفت'], hint: 'شركة برمجيات ونظام التشغيل ويندوز' },
                    { emojis: '📦🚚😃', answers: ['امازون'], hint: 'أكبر متجر إلكتروني في العالم بعلامة ابتسامة' },
                    { emojis: '👟🏎️🐆', answers: ['بوما'], hint: 'ماركة رياضية تحمل اسم فهد' },
                    { emojis: '🚗🐂🟡', answers: ['لامبورغيني'], hint: 'سيارة رياضية خارقة بشعار الثور الهائج' },
                    { emojis: '🎮🟦🇯🇵', answers: ['سوني'], hint: 'الشركة المصنعة لجهاز البلايستيشن' },
                    { emojis: '📱🇰🇷🔵', answers: ['سامسونج'], hint: 'عملاق التكنولوجيا الكوري الجنوبي' },
                    { emojis: '📺🎬🔴', answers: ['نتفليكس'], hint: 'منصة عالمية لمشاهدة الأفلام والمسلسلات' },
                    { emojis: '✈️🇦🇪🔴', answers: ['طيران الامارات'], hint: 'واحدة من أكبر شركات الطيران في العالم' },
                    { emojis: '🚗🇩🇪⭕', answers: ['اودي'], hint: 'سيارة ألمانية بشعار الأربع حلقات المتداخلة' },
                    { emojis: '⌚👑🇨🇭', answers: ['رولكس'], hint: 'أفخم وأشهر ماركة ساعات سويسرية' },
                    { emojis: '👕🐊🟢', answers: ['لاكوست'], hint: 'ماركة ملابس شهيرة بشعار التمساح' },
                    { emojis: '🏰🐭🎢', answers: ['ديزني'], hint: 'أكبر شركة ترفيه وصانعة أفلام الكرتون' },
                    { emojis: '💻🔍🌐', answers: ['جوجل'], hint: 'أشهر محرك بحث في العالم' },
                ]
            }
        };

        const ARABIC_ALPHABET = 'ابتثجحخدذرزسشصضطظعغفقكلمنهوية';

        function App() {
            // حالة التقدم والعملات
            const [solvedProgress, setSolvedProgress] = useState(() => {
                const saved = localStorage.getItem('emojiGameProgress_v4');
                if (saved) return JSON.parse(saved);
                return { movies: [], series: [], games: [], football: [], history: [], brands: [] };
            });

            const [coins, setCoins] = useState(() => {
                const savedCoins = localStorage.getItem('emojiGameCoins_v4');
                return savedCoins !== null ? parseInt(savedCoins, 10) : 50; // رصيد البداية 50 عملة
            });

            // حالة اللعبة الأساسية
            const [activeCategory, setActiveCategory] = useState(null);
            const [currentLevel, setCurrentLevel] = useState(0);
            const [justSolved, setJustSolved] = useState(false);
            const [shake, setShake] = useState(false);
            const [showHintModal, setShowHintModal] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);

            // حالات نظام الألغاز
            const [targetWordOriginal, setTargetWordOriginal] = useState('');
            const [targetWordLetters, setTargetWordLetters] = useState('');
            const [availableLetters, setAvailableLetters] = useState([]);
            const [selectedSlots, setSelectedSlots] = useState([]);

            // حفظ التقدم والعملات
            useEffect(() => {
                localStorage.setItem('emojiGameProgress_v4', JSON.stringify(solvedProgress));
                localStorage.setItem('emojiGameCoins_v4', coins.toString());
            }, [solvedProgress, coins]);

            // إعداد اللغز عند تغيير المرحلة
            useEffect(() => {
                if (!activeCategory) return;
                
                const level = categoriesData[activeCategory].levels[currentLevel];
                const answer = level.answers[0]; 
                
                setTargetWordOriginal(answer);
                
                const answerLettersOnly = answer.replace(/ /g, '');
                setTargetWordLetters(answerLettersOnly);
                setSelectedSlots(Array(answerLettersOnly.length).fill(null));

                const gridLength = Math.max(14, answerLettersOnly.length + 3);
                let charArray = answerLettersOnly.split('');
                
                while(charArray.length < gridLength) {
                    const randomChar = ARABIC_ALPHABET[Math.floor(Math.random() * ARABIC_ALPHABET.length)];
                    charArray.push(randomChar);
                }

                for (let i = charArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [charArray[i], charArray[j]] = [charArray[j], charArray[i]];
                }

                setAvailableLetters(charArray.map((char, index) => ({
                    id: index, char: char, isUsed: false, isRemoved: false
                })));

                setShake(false);
                setJustSolved(false);

            }, [activeCategory, currentLevel]);

            // عرض رسائل التنبيه المؤقتة (Toast)
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(null), 3000);
            };

            // التحقق التلقائي عند تعبئة جميع الخانات
            useEffect(() => {
                if (!activeCategory || !targetWordLetters || selectedSlots.includes(null) || justSolved) return;

                const currentLevelData = categoriesData[activeCategory].levels[currentLevel];
                const expectedAnswer = currentLevelData.answers[0].replace(/ /g, '');

                if (targetWordLetters !== expectedAnswer || selectedSlots.length !== expectedAnswer.length) return;

                const currentGuess = selectedSlots.map(slot => slot.char).join('');

                if (currentGuess === expectedAnswer) {
                    playSound('correct');
                    const isNewSolve = !solvedProgress[activeCategory].includes(currentLevel);
                    const updatedCategoryProgress = [...new Set([...solvedProgress[activeCategory], currentLevel])];
                    
                    if (isNewSolve) {
                        setCoins(prev => prev + 10); // مكافأة 10 عملات
                    }

                    setSolvedProgress(prev => ({ ...prev, [activeCategory]: updatedCategoryProgress }));
                    setJustSolved(true);

                    // الاحتفال إذا أكمل القسم
                    if (updatedCategoryProgress.length === categoriesData[activeCategory].levels.length && isNewSolve) {
                        playSound('win');
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    }

                    setTimeout(() => {
                        const categoryLevels = categoriesData[activeCategory].levels;
                        if (updatedCategoryProgress.length < categoryLevels.length) {
                            let nextUnsolved = (currentLevel + 1) % categoryLevels.length;
                            while (updatedCategoryProgress.includes(nextUnsolved)) {
                                nextUnsolved = (nextUnsolved + 1) % categoryLevels.length;
                            }
                            changeLevel(nextUnsolved);
                        }
                    }, 1500);
                } else {
                    playSound('wrong');
                    setShake(true);
                    
                    setTimeout(() => {
                        setShake(false);
                        // تفريغ الخانات غير المقفلة (المكشوفة بوسيلة المساعدة) فقط
                        setSelectedSlots(prevSlots => prevSlots.map(slot => slot && slot.locked ? slot : null));
                        // إعادة الحروف للشبكة ما لم تكن محذوفة أو مقفلة
                        setAvailableLetters(prev => prev.map(l => {
                            const isLockedInSlot = selectedSlots.some(s => s && s.id === l.id && s.locked);
                            return (isLockedInSlot || l.isRemoved) ? l : { ...l, isUsed: false };
                        }));
                    }, 800);
                }
            }, [selectedSlots, activeCategory, currentLevel, solvedProgress, targetWordLetters, justSolved]);

            // عند النقر على حرف متاح
            const handleLetterClick = (letterObj) => {
                if (letterObj.isUsed || letterObj.isRemoved || solvedProgress[activeCategory].includes(currentLevel)) return;
                
                const firstEmptyIndex = selectedSlots.findIndex(slot => slot === null);
                if (firstEmptyIndex !== -1) {
                    playSound('click');
                    const newSlots = [...selectedSlots];
                    newSlots[firstEmptyIndex] = letterObj;
                    setSelectedSlots(newSlots);

                    setAvailableLetters(prev => prev.map(l => 
                        l.id === letterObj.id ? { ...l, isUsed: true } : l
                    ));
                }
            };

            // عند النقر على خانة معبأة
            const handleSlotClick = (index) => {
                const slotObj = selectedSlots[index];
                // منع إرجاع الحرف إذا كانت الخانة مقفلة (تم كشفها بالمساعدة)
                if (!slotObj || slotObj.locked || solvedProgress[activeCategory].includes(currentLevel) || justSolved) return;
                
                playSound('click');
                setAvailableLetters(prev => prev.map(l => 
                    l.id === slotObj.id ? { ...l, isUsed: false } : l
                ));

                const newSlots = [...selectedSlots];
                newSlots[index] = null;
                setSelectedSlots(newSlots);
            };

            // وسائل المساعدة 1: كشف حرف صحيح
            const handleRevealLetter = () => {
                if (solvedProgress[activeCategory].includes(currentLevel) || justSolved) return;
                if (coins < 20) {
                    showToast('🪙 عذراً، رصيدك من العملات لا يكفي!');
                    return;
                }
                
                const firstEmptyIndex = selectedSlots.findIndex(slot => slot === null);
                if (firstEmptyIndex === -1) return; // جميع الخانات ممتلئة

                playSound('click');
                setCoins(prev => prev - 20);
                const expectedChar = targetWordLetters[firstEmptyIndex];

                const letterIndex = availableLetters.findIndex(l => l.char === expectedChar && !l.isUsed && !l.isRemoved);
                if (letterIndex !== -1) {
                    const letterObj = availableLetters[letterIndex];

                    setAvailableLetters(prev => {
                        const next = [...prev];
                        next[letterIndex] = { ...next[letterIndex], isUsed: true };
                        return next;
                    });

                    setSelectedSlots(prev => {
                        const next = [...prev];
                        next[firstEmptyIndex] = { ...letterObj, locked: true }; // قفل الحرف
                        return next;
                    });
                }
            };

            // وسائل المساعدة 2: حذف 3 حروف خاطئة
            const handleRemoveWrongLetters = () => {
                if (solvedProgress[activeCategory].includes(currentLevel) || justSolved) return;
                if (coins < 30) {
                    showToast('🪙 عذراً، رصيدك من العملات لا يكفي!');
                    return;
                }

                // تحديد الحروف الممكن حذفها (تلك التي ليست من ضمن الإجابة أو زائدة عن الحاجة)
                const targetCharsCount = {};
                for(let c of targetWordLetters) {
                    targetCharsCount[c] = (targetCharsCount[c] || 0) + 1;
                }

                const currentCounts = { ...targetCharsCount };
                const essentialIds = new Set();
                
                // تحديد الحروف الأساسية التي لا يمكن حذفها
                availableLetters.forEach(l => {
                    if(currentCounts[l.char] > 0 && !l.isRemoved && (!l.isUsed || (l.isUsed && selectedSlots.some(s => s?.id === l.id && s.locked)))) {
                        essentialIds.add(l.id);
                        currentCounts[l.char]--;
                    }
                });

                // تجميع معرفات الحروف القابلة للحذف
                const removableIds = [];
                availableLetters.forEach(l => {
                    if(!essentialIds.has(l.id) && !l.isUsed && !l.isRemoved) {
                        removableIds.push(l.id);
                    }
                });

                if (removableIds.length === 0) {
                    showToast('لا يوجد حروف خاطئة إضافية لحذفها!');
                    return;
                }

                playSound('click');
                setCoins(prev => prev - 30);
                
                // اختيار ما يصل إلى 3 حروف عشوائياً لحذفها
                const toRemove = removableIds.sort(() => Math.random() - 0.5).slice(0, 3);
                
                setAvailableLetters(prev => prev.map(l => 
                    toRemove.includes(l.id) ? { ...l, isUsed: true, isRemoved: true } : l
                ));
            };

            // مشاركة اللغز
            const handleShare = () => {
                playSound('click');
                const emojis = categoriesData[activeCategory].levels[currentLevel].emojis;
                const text = `أنا عالق في هذه المرحلة من لعبة "تحدي الإيموجي" 🧠\nهل يمكنك معرفة الإجابة؟ ${emojis}`;
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('تم النسخ! شارك اللغز الآن مع أصدقائك 📤');
                    }).catch(() => fallbackCopyTextToClipboard(text));
                } else {
                    fallbackCopyTextToClipboard(text);
                }
            };

            const fallbackCopyTextToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('تم النسخ! شارك اللغز الآن مع أصدقائك 📤');
                } catch (err) {
                    showToast('فشل النسخ تلقائياً!');
                }
                document.body.removeChild(textArea);
            };

            const changeLevel = (newLevel) => {
                playSound('click');
                setCurrentLevel(newLevel);
                setShowHintModal(false);
            };

            const selectCategory = (categoryId) => {
                playSound('click');
                setActiveCategory(categoryId);
                const categorySolved = solvedProgress[categoryId];
                const totalLevels = categoriesData[categoryId].levels.length;
                let startingLevel = 0;
                
                if (categorySolved.length > 0 && categorySolved.length < totalLevels) {
                    for (let i = 0; i < totalLevels; i++) {
                        if (!categorySolved.includes(i)) {
                            startingLevel = i;
                            break;
                        }
                    }
                }
                setCurrentLevel(startingLevel);
            };

            const resetAllProgress = () => {
                if (window.confirm('هل أنت متأكد أنك تريد حذف جميع تقدمك والبدء من جديد؟')) {
                    setSolvedProgress({ movies: [], series: [], games: [], football: [], history: [], brands: [] });
                    setCoins(50);
                    setActiveCategory(null);
                }
            };

            // واجهة اختيار الأقسام
            if (!activeCategory) {
                const totalLevelsCount = Object.keys(categoriesData).length * 20; // 6 * 20 = 120
                const totalSolved = Object.values(solvedProgress).reduce((acc, curr) => acc + curr.length, 0);
                const isMaster = totalSolved === totalLevelsCount;

                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 p-4 sm:p-8">
                        <div className="max-w-5xl mx-auto">
                            {/* شريط العملات العلوي */}
                            <div className="flex justify-end mb-4 px-2">
                                <div className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold shadow-lg flex items-center gap-2 border-2 border-yellow-200">
                                    <span className="text-xl">🪙</span>
                                    <span>{coins} عملة</span>
                                </div>
                            </div>

                            <div className="text-center mb-10 animate-fade-in">
                                <h1 className="text-4xl sm:text-5xl font-extrabold text-white mb-4 drop-shadow-lg">تحدي الإيموجي 🧠✨</h1>
                                <p className="text-indigo-200 text-lg mb-6">اختر القسم وابدأ التحدي.. لديك {totalLevelsCount} مرحلة!</p>
                                
                                <div className="bg-white/10 p-4 rounded-2xl backdrop-blur-sm max-w-xl mx-auto border border-white/20">
                                    <div className="flex justify-between text-white font-bold mb-2">
                                        <span>التقدم الإجمالي</span>
                                        <span className={isMaster ? 'text-yellow-400' : ''}>{totalSolved} / {totalLevelsCount}</span>
                                    </div>
                                    <div className="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
                                        <div 
                                            className="bg-gradient-to-r from-blue-400 to-emerald-400 h-4 rounded-full transition-all duration-1000"
                                            style={{ width: `${(totalSolved / totalLevelsCount) * 100}%` }}
                                        ></div>
                                    </div>
                                    {isMaster && <p className="text-yellow-400 mt-2 font-bold animate-pulse">👑يا فنااااااااااااااااااان ختمت اللعبة👑</p>}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {Object.values(categoriesData).map((cat) => {
                                    const solvedCount = solvedProgress[cat.id]?.length || 0;
                                    const isCompleted = solvedCount === 20;

                                    return (
                                        <button
                                            key={cat.id}
                                            onClick={() => selectCategory(cat.id)}
                                            className="relative overflow-hidden group rounded-3xl p-6 text-right transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl bg-white"
                                        >
                                            <div className={`absolute top-0 right-0 w-full h-2 bg-gradient-to-r ${cat.color}`}></div>
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="text-5xl group-hover:scale-110 transition-transform">{cat.icon}</div>
                                                {isCompleted && <div className="text-3xl" title="مكتمل">🏆</div>}
                                            </div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-2">{cat.name}</h2>
                                            
                                            <div className="flex items-center justify-between text-sm font-semibold text-gray-500 mt-4">
                                                <span>{solvedCount} مرحلة محلولة</span>
                                                <span>{Math.round((solvedCount/20)*100)}%</span>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-2 mt-2">
                                                <div 
                                                    className={`h-2 rounded-full bg-gradient-to-r ${cat.color} transition-all duration-500`}
                                                    style={{ width: `${(solvedCount / 20) * 100}%` }}
                                                ></div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="mt-12 text-center">
                                <button onClick={resetAllProgress} className="text-red-400 hover:text-red-300 underline text-sm">
                                    إعادة ضبط جميع الإحصائيات (بدء اللعبة من جديد)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // واجهة اللعب
            const currentCat = categoriesData[activeCategory];
            const levels = currentCat.levels;
            const categorySolved = solvedProgress[activeCategory] || [];
            const isCurrentSolved = categorySolved.includes(currentLevel);
            const isCategoryFinished = categorySolved.length === levels.length;

            return (
                <div className="min-h-screen flex items-center justify-center p-3 sm:p-4 bg-gray-50 relative overflow-hidden">
                    <div className={`absolute inset-0 opacity-20 bg-gradient-to-br ${currentCat.color}`}></div>
                    
                    {/* شريط الإشعارات (Toast) */}
                    {toastMessage && (
                        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold animate-fade-in text-sm sm:text-base text-center w-max max-w-[90vw]">
                            {toastMessage}
                        </div>
                    )}

                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-5 sm:p-8 relative z-10 flex flex-col h-[95vh] sm:h-auto max-h-[950px]">
                        
                        {/* الهيدر وزر الخروج */}
                        <div className="flex justify-between items-center mb-6">
                            <button 
                                onClick={() => setActiveCategory(null)}
                                className="text-gray-500 hover:text-gray-800 flex items-center gap-2 font-bold transition-colors bg-gray-100 px-3 py-2 rounded-lg text-sm"
                            >
                                <span className="text-lg leading-none">&times;</span> خروج
                            </button>
                            
                            <div className="flex gap-4 items-center">
                                <div className="text-sm font-bold text-gray-400">
                                    {categorySolved.length} / {levels.length}
                                </div>
                                <div className="bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-full font-bold text-sm flex items-center gap-1 border border-yellow-200">
                                    <span>{coins}</span>
                                    <span>🪙</span>
                                </div>
                            </div>
                        </div>

                        {/* رأس اللعبة والتنقل */}
                        <div className="w-full text-center mb-4">
                            <div className="text-3xl mb-1">{currentCat.icon}</div>
                            
                            <div className="flex items-center justify-between bg-gray-50 border rounded-2xl p-1 mb-2">
                                <button 
                                    onClick={() => changeLevel(Math.max(0, currentLevel - 1))}
                                    disabled={currentLevel === 0}
                                    className={`px-3 py-2 rounded-xl font-bold transition ${currentLevel === 0 ? 'text-gray-300' : 'text-blue-600 hover:bg-white shadow-sm'}`}
                                >
                                    &rarr; 
                                </button>
                                <span className="font-bold text-gray-700">مرحلة {currentLevel + 1}</span>
                                <button 
                                    onClick={() => changeLevel(Math.min(levels.length - 1, currentLevel + 1))}
                                    disabled={currentLevel === levels.length - 1}
                                    className={`px-3 py-2 rounded-xl font-bold transition ${currentLevel === levels.length - 1 ? 'text-gray-300' : 'text-blue-600 hover:bg-white shadow-sm'}`}
                                >
                                     &larr;
                                </button>
                            </div>
                            
                            <div className="w-full bg-gray-100 rounded-full h-2">
                                <div 
                                    className={`h-2 rounded-full transition-all duration-700 bg-gradient-to-r ${currentCat.color}`}
                                    style={{ width: `${(categorySolved.length / levels.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* قسم الإيموجي */}
                        <div className={`bg-gray-50 rounded-2xl w-full py-6 sm:py-8 mb-4 flex flex-col justify-center items-center shadow-inner border transition-all ${isCurrentSolved && !justSolved ? 'border-green-300 bg-green-50' : 'border-gray-200'}`}>
                            <span className={`text-5xl sm:text-6xl tracking-widest ${justSolved ? 'animate-bounce' : ''}`}>
                                {levels[currentLevel].emojis}
                            </span>
                            
                            {!isCurrentSolved && !justSolved && (
                                <button 
                                    onClick={() => { playSound('click'); setShowHintModal(true); }}
                                    className="mt-4 flex items-center gap-1 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-3 py-1.5 rounded-full font-bold transition text-xs shadow-sm border border-yellow-300"
                                >
                                    💡 تلميح مجاني
                                </button>
                            )}
                        </div>

                        {/* منطقة اللعب السفلية */}
                        <div className="flex-grow flex flex-col justify-end">
                            {isCategoryFinished && !justSolved ? (
                                <div className="bg-green-50 border border-green-200 rounded-2xl p-6 text-center animate-fade-in mb-4">
                                    <div className="text-4xl mb-4">🏆</div>
                                    <h3 className="text-xl font-bold text-green-800 mb-2">أنهيت قسم {currentCat.name}!</h3>
                                    <button 
                                        onClick={() => { playSound('click'); setActiveCategory(null); }}
                                        className="mt-4 bg-green-600 text-white font-bold py-2 px-6 rounded-xl w-full hover:bg-green-700 transition"
                                    >
                                        العودة للقائمة
                                    </button>
                                </div>
                            ) : justSolved ? (
                                <div className="w-full text-center py-6 text-green-500 font-bold text-xl sm:text-2xl animate-pulse flex-grow flex flex-col items-center justify-center gap-2">
                                    <span>إجابة صحيحة! 👏</span>
                                    {!categorySolved.includes(currentLevel) && <span className="text-yellow-500 text-sm bg-yellow-100 px-3 py-1 rounded-full">+10 عملات 🪙</span>}
                                </div>
                            ) : isCurrentSolved ? (
                                <div className="w-full text-center py-5 bg-green-100 text-green-700 rounded-xl border border-green-200 font-bold flex-grow flex flex-col items-center justify-center gap-2">
                                    <span className="text-xl">تم حل هذه المرحلة ✅</span>
                                    <div className="text-lg font-bold text-green-800 bg-white/60 px-6 py-2 rounded-full mt-2">
                                        {targetWordOriginal}
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4 sm:gap-6">
                                    
                                    {/* 1. خانات الإجابة */}
                                    <div className={`flex flex-wrap justify-center gap-x-1.5 gap-y-3 sm:gap-2 dir-rtl ${shake ? 'animate-shake' : ''}`}>
                                        {(() => {
                                            let letterIndex = 0;
                                            return targetWordOriginal.split('').map((char, index) => {
                                                if (char === ' ') return <div key={`space-${index}`} className="w-3 sm:w-5"></div>;
                                                
                                                const currentIndex = letterIndex++;
                                                const slotData = selectedSlots[currentIndex];
                                                
                                                return (
                                                    <div 
                                                        key={`slot-${currentIndex}`} 
                                                        onClick={() => handleSlotClick(currentIndex)}
                                                        className={`w-9 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-xl sm:text-2xl font-bold rounded-xl border-b-4 transition-all select-none
                                                            ${slotData 
                                                                ? (slotData.locked ? 'bg-green-500 border-green-700 text-white shadow-md' : 'bg-blue-600 border-blue-800 text-white animate-pop shadow-md cursor-pointer') 
                                                                : 'bg-gray-100 border-gray-300 text-transparent'
                                                            }`}
                                                    >
                                                        {slotData ? slotData.char : ''}
                                                    </div>
                                                );
                                            });
                                        })()}
                                    </div>

                                    {/* وسائل المساعدة الإضافية */}
                                    <div className="flex justify-center gap-2 sm:gap-3 px-1 mt-1 mb-1">
                                        <button onClick={handleRevealLetter} className="flex-1 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-xs sm:text-sm font-bold py-2 rounded-xl shadow-sm flex flex-col items-center gap-1 transition-colors active:bg-gray-100">
                                            <span>🔍 كشف حرف</span>
                                            <span className="text-yellow-600 font-extrabold">20 🪙</span>
                                        </button>
                                        <button onClick={handleRemoveWrongLetters} className="flex-1 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-xs sm:text-sm font-bold py-2 rounded-xl shadow-sm flex flex-col items-center gap-1 transition-colors active:bg-gray-100">
                                            <span>💣 حذف 3 أحرف</span>
                                            <span className="text-yellow-600 font-extrabold">30 🪙</span>
                                        </button>
                                        <button onClick={handleShare} className="flex-1 bg-gradient-to-r from-green-400 to-green-500 text-white text-xs sm:text-sm font-bold py-2 rounded-xl shadow-sm flex flex-col items-center justify-center gap-1 transition-opacity hover:opacity-90 active:scale-95">
                                            <span className="text-base sm:text-lg">📤</span>
                                            <span>تحدى أصدقاءك</span>
                                        </button>
                                    </div>

                                    {/* 2. شبكة الحروف المتاحة */}
                                    <div className="grid grid-cols-7 gap-1.5 sm:gap-3 bg-gray-100 p-2 sm:p-4 rounded-2xl border border-gray-200">
                                        {availableLetters.map((letterObj) => (
                                            <button
                                                key={`letter-${letterObj.id}`}
                                                onClick={() => handleLetterClick(letterObj)}
                                                disabled={letterObj.isUsed || letterObj.isRemoved}
                                                className={`h-11 sm:h-14 rounded-lg sm:rounded-xl text-lg sm:text-2xl font-bold flex items-center justify-center transition-all select-none
                                                    ${(letterObj.isUsed || letterObj.isRemoved) 
                                                        ? 'bg-transparent text-transparent opacity-0 scale-75 pointer-events-none' 
                                                        : 'bg-white text-gray-800 border-b-4 border-gray-300 hover:bg-blue-50 hover:border-blue-300 active:border-b-0 active:translate-y-1 shadow-sm'
                                                    }`}
                                            >
                                                {letterObj.char}
                                            </button>
                                        ))}
                                    </div>
                                    
                                </div>
                            )}
                        </div>

                        {/* نافذة التلميح (Modal) */}
                        {showHintModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 animate-fade-in backdrop-blur-sm">
                                <div className="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
                                    <div className="text-4xl mb-3">💡</div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-2">تلميح</h3>
                                    <p className="text-gray-600 mb-6 text-lg leading-relaxed">
                                        {levels[currentLevel].hint}
                                    </p>
                                    <button 
                                        onClick={() => { playSound('click'); setShowHintModal(false); }}
                                        className="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 rounded-xl transition"
                                    >
                                        إغلاق
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
